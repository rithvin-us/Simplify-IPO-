# One-line run:  docker compose up --build
# Then open      http://localhost:5173
#
# Phase 2: PostgreSQL (with pgvector) is the system of record. The stack still
# runs fully offline (stub LLM, local hash embeddings). To use a real model,
# export LLM_PROVIDER + the matching API key before `up` (the AI image already
# includes the anthropic/openai SDKs).

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ipow
      POSTGRES_PASSWORD: ipow
      POSTGRES_DB: ipow
    volumes:
      - dbdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipow -d ipow"]
      interval: 3s
      timeout: 3s
      retries: 20

  ai-service:
    build: ./ai-service
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-stub}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DATABASE_URL: postgres://ipow:ipow@db:5432/ipow   # Module 15: pgvector RAG index
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"   # AI docs at http://localhost:8000/docs

  backend:
    build: ./backend
    environment:
      PORT: "4000"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod}
      AI_SERVICE_URL: http://ai-service:8000
      DATABASE_URL: postgres://ipow:ipow@db:5432/ipow
      RUN_MIGRATIONS: "1"   # apply database/schema.sql + migrations at startup
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_started
    ports:
      - "4000:4000"   # backend health at http://localhost:4000/api/health

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"     # app at http://localhost:5173

volumes:
  dbdata:
